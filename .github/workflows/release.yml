name: Release

on:
  push:
    branches: [main]

# Only one release at a time
concurrency:
  group: release
  cancel-in-progress: false

env:
  APP_NAME: OakReader
  SCHEME: OakReader
  # R2 / hosting. The DMG lives at $DOWNLOAD_BASE_URL/$R2_PREFIX/v<version>/OakReader.dmg
  # and the appcast at $DOWNLOAD_BASE_URL/$R2_PREFIX/appcast.xml (matches SUFeedURL).
  R2_BUCKET: oakreader-downloads
  R2_PREFIX: oakreader
  DOWNLOAD_BASE_URL: https://downloads.oakreader.com
  SPARKLE_VERSION: "2.6.4"

jobs:
  release:
    # macos-26 ships Xcode 26 (Swift 6.2+), required by transitive deps like
    # mlx-audio-swift that pin Swift tools 6.2. macos-15 (Xcode 16/Swift 6.0)
    # fails package resolution.
    runs-on: macos-26
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      # ── Checkout (full history for commit count & appcast) ────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Version = MARKETING_VERSION (source of truth, in project.yml) ──
      - name: Extract version
        id: version
        run: |
          VERSION=$(sed -n 's/.*MARKETING_VERSION: *"\([^"]*\)".*/\1/p' project.yml | head -1 | xargs)
          if [ -z "$VERSION" ]; then
            echo "::error::Could not extract MARKETING_VERSION from project.yml"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      # ── Build number = git commit count (monotonic; Sparkle compares it) ──
      - name: Compute build number
        id: build-number
        run: |
          # CFBundleVersion (CURRENT_PROJECT_VERSION) must strictly increase
          # across shipped builds or generate_appcast collapses releases into
          # one item and installed apps miss updates. Commit count on main is
          # monotonic and reproducible off-CI.
          BUILD_NUMBER=$(git rev-list --count HEAD)
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Build number: $BUILD_NUMBER"

      # ── Dedup guard: skip if v<version> already released ──────
      - name: Check if release needed
        id: check
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Tag v${{ steps.version.outputs.version }} already exists, skipping release"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "New version: ${{ steps.version.outputs.version }}"
          fi

      # ── Import Developer ID signing certificate ───────────────
      - name: Import signing certificate
        if: steps.check.outputs.skip == 'false'
        env:
          DEVELOPER_ID_CERT_P12: ${{ secrets.DEVELOPER_ID_CERT_P12 }}
          DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"

          echo "$DEVELOPER_ID_CERT_P12" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$DEVELOPER_ID_CERT_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      # ── Install provisioning profile (for keychain-access-groups) ──
      - name: Install provisioning profile
        id: profile
        if: steps.check.outputs.skip == 'false'
        env:
          PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}
        run: |
          PROFILE_PATH="$RUNNER_TEMP/oakreader.provisionprofile"
          echo "$PROVISIONING_PROFILE" | base64 --decode > "$PROFILE_PATH"

          PROFILE_PLIST=$(security cms -D -i "$PROFILE_PATH")
          UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /dev/stdin <<< "$PROFILE_PLIST")
          NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" /dev/stdin <<< "$PROFILE_PLIST")

          DEST="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$DEST"
          cp "$PROFILE_PATH" "$DEST/$UUID.provisionprofile"

          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "Installed provisioning profile: $NAME ($UUID)"

      # ── Generate Xcode project from project.yml ───────────────
      - name: Install XcodeGen
        if: steps.check.outputs.skip == 'false'
        run: brew install xcodegen

      - name: Generate Xcode project
        if: steps.check.outputs.skip == 'false'
        run: xcodegen generate

      # -onlyUsePackageVersionsFromResolvedFile pins to the committed
      # Package.resolved so CI uses the same dependency versions as local
      # (otherwise newer usearch drops .F32 and breaks HybridSearchEngine).
      - name: Resolve packages
        if: steps.check.outputs.skip == 'false'
        run: |
          xcodebuild -resolvePackageDependencies \
            -onlyUsePackageVersionsFromResolvedFile \
            -project ${{ env.APP_NAME }}.xcodeproj \
            -scheme ${{ env.SCHEME }}

      # ── Archive (version + build number injected here) ────────
      # Signing (manual Developer ID + profile) is scoped to the OakReader
      # target in project.yml's Release config — NOT passed globally here,
      # which would break SPM package targets and the oak tool.
      - name: Build archive
        if: steps.check.outputs.skip == 'false'
        run: |
          xcodebuild archive \
            -project ${{ env.APP_NAME }}.xcodeproj \
            -scheme ${{ env.SCHEME }} \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/${{ env.APP_NAME }}.xcarchive" \
            MARKETING_VERSION="${{ steps.version.outputs.version }}" \
            CURRENT_PROJECT_VERSION="${{ steps.build-number.outputs.build_number }}" \
            -onlyUsePackageVersionsFromResolvedFile \
            -skipPackagePluginValidation \
            -skipMacroValidation

      - name: Export app
        if: steps.check.outputs.skip == 'false'
        run: |
          # Inject the provisioning profile name into ExportOptions
          sed -i '' "s/__PROVISIONING_PROFILE_NAME__/${{ steps.profile.outputs.name }}/" ExportOptions.plist

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/${{ env.APP_NAME }}.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist ExportOptions.plist

      # ── Sign embedded oak CLI, then re-seal the app bundle ────
      - name: Sign embedded binaries
        if: steps.check.outputs.skip == 'false'
        run: |
          APP="$RUNNER_TEMP/export/${{ env.APP_NAME }}.app"
          IDENTITY="Developer ID Application"

          # The oak CLI is copied into Contents/Resources by a build phase, so
          # Xcode's export may not sign it. Sign every loose Mach-O in Resources
          # with the hardened runtime (oak uses no restricted entitlements).
          # Sparkle's frameworks/XPC services keep their own signatures — we do
          # NOT --deep re-sign, which would clobber them.
          find "$APP/Contents/Resources" -type f -perm +111 | while read -r f; do
            if file "$f" | grep -q "Mach-O"; then
              echo "Signing: $f"
              codesign --force --sign "$IDENTITY" --options runtime --timestamp "$f"
            fi
          done

          # Re-seal the outer bundle so CodeResources covers the (re)signed oak.
          # The embedded provisioning profile is preserved, so the restricted
          # keychain-access-groups entitlement still validates at launch.
          codesign --force --sign "$IDENTITY" --options runtime --timestamp \
            --entitlements OakReader/OakReader.entitlements "$APP"

          codesign --verify --deep --strict --verbose=2 "$APP"

      # ── Package DMG ───────────────────────────────────────────
      - name: Create DMG
        if: steps.check.outputs.skip == 'false'
        run: |
          brew install create-dmg
          APP="$RUNNER_TEMP/export/${{ env.APP_NAME }}.app"
          DMG_PATH="$RUNNER_TEMP/${{ env.APP_NAME }}.dmg"

          create-dmg \
            --volname "${{ env.APP_NAME }}" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 160 \
            --icon "${{ env.APP_NAME }}.app" 180 170 \
            --hide-extension "${{ env.APP_NAME }}.app" \
            --app-drop-link 480 170 \
            --no-internet-enable \
            "$DMG_PATH" \
            "$APP"

          echo "DMG_PATH=$DMG_PATH" >> "$GITHUB_ENV"

      # ── Notarize + staple (App Store Connect API key) ─────────
      - name: Notarize DMG
        if: steps.check.outputs.skip == 'false'
        env:
          ASC_API_KEY: ${{ secrets.ASC_API_KEY }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          ASC_KEY_PATH="$RUNNER_TEMP/asc_api_key.p8"
          echo "$ASC_API_KEY" | base64 --decode > "$ASC_KEY_PATH"

          xcrun notarytool submit "$DMG_PATH" \
            --key "$ASC_KEY_PATH" \
            --key-id "$ASC_KEY_ID" \
            --issuer "$ASC_ISSUER_ID" \
            --wait

          xcrun stapler staple "$DMG_PATH"

      # ── Sparkle: sign + generate appcast (MERGING history) ────
      - name: Install Sparkle tools
        if: steps.check.outputs.skip == 'false'
        run: |
          curl -sL "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" \
            | tar xJ -C "$RUNNER_TEMP" bin/sign_update bin/generate_appcast
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Generate appcast
        if: steps.check.outputs.skip == 'false'
        env:
          SPARKLE_ED_KEY: ${{ secrets.SPARKLE_ED_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          APPCAST_DIR="$RUNNER_TEMP/appcast_dir"
          mkdir -p "$APPCAST_DIR"

          # Download the existing appcast so generate_appcast MERGES rather than
          # replaces. Without this, each release's appcast contains only the
          # latest item and installed clients lose the update chain.
          aws s3 cp "s3://$R2_BUCKET/$R2_PREFIX/appcast.xml" \
            "$APPCAST_DIR/appcast.xml" \
            --endpoint-url "$R2_ENDPOINT" \
            || echo "::warning::No existing appcast.xml — generating fresh history"

          cp "$DMG_PATH" "$APPCAST_DIR/"

          echo "$SPARKLE_ED_KEY" | generate_appcast \
            --ed-key-file - \
            --download-url-prefix "$DOWNLOAD_BASE_URL/$R2_PREFIX/v${VERSION}/" \
            "$APPCAST_DIR"

          cp "$APPCAST_DIR/appcast.xml" "$RUNNER_TEMP/appcast.xml"

      # ── Upload DMG + appcast to R2 ────────────────────────────
      - name: Upload to R2
        if: steps.check.outputs.skip == 'false'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          aws s3 cp "$DMG_PATH" \
            "s3://$R2_BUCKET/$R2_PREFIX/v${VERSION}/${{ env.APP_NAME }}.dmg" \
            --endpoint-url "$R2_ENDPOINT"

          aws s3 cp "$RUNNER_TEMP/appcast.xml" \
            "s3://$R2_BUCKET/$R2_PREFIX/appcast.xml" \
            --endpoint-url "$R2_ENDPOINT"

      # ── Tag + GitHub Release (draft) ──────────────────────────
      - name: Create tag and GitHub Release
        if: steps.check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          git tag "v${VERSION}"
          git push origin "v${VERSION}"

          gh release create "v${VERSION}" \
            --title "${{ env.APP_NAME }} v${VERSION}" \
            --draft \
            --notes "Download: $DOWNLOAD_BASE_URL/$R2_PREFIX/v${VERSION}/${{ env.APP_NAME }}.dmg"

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/signing.keychain-db" 2>/dev/null || true
