name: Release

on:
  push:
    branches: [main]

# Only one release at a time
concurrency:
  group: release
  cancel-in-progress: false

env:
  APP_NAME: OakReader
  SCHEME: OakReader
  # R2 / hosting. The DMG lives at $DOWNLOAD_BASE_URL/$R2_PREFIX/v<version>/OakReader.dmg
  # and the appcast at $DOWNLOAD_BASE_URL/$R2_PREFIX/appcast.xml (matches SUFeedURL).
  R2_BUCKET: oakreader-downloads
  R2_PREFIX: oakreader
  DOWNLOAD_BASE_URL: https://downloads.oakreader.com
  SPARKLE_VERSION: "2.6.4"

jobs:
  release:
    # macos-26 ships the current Xcode/Swift toolchain. (The build no longer
    # depends on MLX/usearch, so an older image would likely work too, but
    # macos-26 keeps CI on the same toolchain used locally.)
    runs-on: macos-26
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      # ── Checkout (full history for commit count & appcast) ────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Version = MARKETING_VERSION (source of truth, in project.yml) ──
      - name: Extract version
        id: version
        run: |
          VERSION=$(sed -n 's/.*MARKETING_VERSION: *"\([^"]*\)".*/\1/p' project.yml | head -1 | xargs)
          if [ -z "$VERSION" ]; then
            echo "::error::Could not extract MARKETING_VERSION from project.yml"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      # ── Build number = git commit count (monotonic; Sparkle compares it) ──
      - name: Compute build number
        id: build-number
        run: |
          # CFBundleVersion (CURRENT_PROJECT_VERSION) must strictly increase
          # across shipped builds or generate_appcast collapses releases into
          # one item and installed apps miss updates. Commit count on main is
          # monotonic and reproducible off-CI.
          BUILD_NUMBER=$(git rev-list --count HEAD)
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Build number: $BUILD_NUMBER"

      # ── Dedup guard: skip if v<version> already released ──────
      - name: Check if release needed
        id: check
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Tag v${{ steps.version.outputs.version }} already exists, skipping release"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "New version: ${{ steps.version.outputs.version }}"
          fi

      # ── Import Developer ID signing certificate ───────────────
      - name: Import signing certificate
        if: steps.check.outputs.skip == 'false'
        env:
          DEVELOPER_ID_CERT_P12: ${{ secrets.DEVELOPER_ID_CERT_P12 }}
          DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"

          echo "$DEVELOPER_ID_CERT_P12" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$DEVELOPER_ID_CERT_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      # ── Import the Developer ID provisioning profile ──────────
      # The app ships the restricted `keychain-access-groups` entitlement
      # (data-protection keychain). A Developer ID app with a restricted
      # entitlement is SIGKILLed by AMFI at launch unless a matching provisioning
      # profile is embedded — notarization still passes, so a missing profile only
      # surfaces as "the downloaded app won't open." We install the profile here
      # so the archive step (PROVISIONING_PROFILE_SPECIFIER in project.yml's
      # Release config) embeds it. Fail fast and loud if it's missing or wrong,
      # BEFORE the long archive.
      - name: Import provisioning profile
        if: steps.check.outputs.skip == 'false'
        env:
          PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}
        run: |
          if [ -z "$PROVISIONING_PROFILE" ]; then
            echo "::error::PROVISIONING_PROFILE secret is not set. The app declares the restricted keychain-access-groups entitlement, so the Developer ID build needs an embedded provisioning profile or it is SIGKILLed at launch. Create a Developer ID provisioning profile in the Apple Developer portal — App ID com.oakreader.OakReader, with the Keychain Sharing capability (group 5Y27G7B6D8.com.oakreader.keys), named EXACTLY 'OakReader Developer ID' — then run: base64 -i OakReader_Developer_ID.provisionprofile | gh secret set PROVISIONING_PROFILE --repo OWNER/REPO. See the macos-release-setup skill, failure mode #4."
            exit 1
          fi

          PROFILE_PATH="$RUNNER_TEMP/oakreader.provisionprofile"
          echo "$PROVISIONING_PROFILE" | base64 --decode > "$PROFILE_PATH"

          # Decode the CMS-signed profile to inspect its embedded plist.
          security cms -D -i "$PROFILE_PATH" > "$RUNNER_TEMP/profile.plist"

          # Must grant our keychain group (exact, or a team wildcard 5Y27G7B6D8.*).
          if ! /usr/libexec/PlistBuddy -c 'Print :Entitlements:keychain-access-groups' "$RUNNER_TEMP/profile.plist" 2>/dev/null \
               | grep -qE '5Y27G7B6D8\.(com\.oakreader\.keys|\*)'; then
            echo "::error::The provisioning profile does not grant keychain group 5Y27G7B6D8.com.oakreader.keys (or 5Y27G7B6D8.*). Recreate it with the Keychain Sharing capability for that group."
            exit 1
          fi

          # Name must match project.yml's PROVISIONING_PROFILE_SPECIFIER exactly.
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print :Name' "$RUNNER_TEMP/profile.plist")
          if [ "$PROFILE_NAME" != "OakReader Developer ID" ]; then
            echo "::error::Provisioning profile name is '$PROFILE_NAME' but project.yml expects exactly 'OakReader Developer ID'. Rename the profile in the portal (or update PROVISIONING_PROFILE_SPECIFIER) so they match."
            exit 1
          fi

          # Warn if it expires within 30 days (Developer ID profiles are time-limited).
          EXP=$(/usr/libexec/PlistBuddy -c 'Print :ExpirationDate' "$RUNNER_TEMP/profile.plist" 2>/dev/null || echo "")
          echo "Provisioning profile '$PROFILE_NAME' OK; expires: $EXP"

          # Install where Xcode looks it up by name during the archive.
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$RUNNER_TEMP/profile.plist")
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          cp "$PROFILE_PATH" "$PROFILE_DIR/$PROFILE_UUID.provisionprofile"

      # ── Generate Xcode project from project.yml ───────────────
      - name: Install XcodeGen
        if: steps.check.outputs.skip == 'false'
        run: brew install xcodegen

      - name: Generate Xcode project
        if: steps.check.outputs.skip == 'false'
        run: xcodegen generate

      # -onlyUsePackageVersionsFromResolvedFile pins to the committed
      # Package.resolved so CI builds the same dependency versions as local,
      # keeping releases reproducible.
      - name: Resolve packages
        if: steps.check.outputs.skip == 'false'
        run: |
          xcodebuild -resolvePackageDependencies \
            -onlyUsePackageVersionsFromResolvedFile \
            -project ${{ env.APP_NAME }}.xcodeproj \
            -scheme ${{ env.SCHEME }}

      # ── Archive (version + build number injected here) ────────
      # Manual Developer ID signing is scoped to the OakReader target in
      # project.yml's Release config — NOT passed globally here, which would
      # break SPM package targets and the oak tool.
      - name: Build archive
        if: steps.check.outputs.skip == 'false'
        run: |
          xcodebuild archive \
            -project ${{ env.APP_NAME }}.xcodeproj \
            -scheme ${{ env.SCHEME }} \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/${{ env.APP_NAME }}.xcarchive" \
            MARKETING_VERSION="${{ steps.version.outputs.version }}" \
            CURRENT_PROJECT_VERSION="${{ steps.build-number.outputs.build_number }}" \
            -onlyUsePackageVersionsFromResolvedFile \
            -skipPackagePluginValidation \
            -skipMacroValidation

      # ── Extract the app from the archive ──────────────────────
      # The archive's product is already Developer-ID-signed (manual signing is
      # scoped to the OakReader Release config in project.yml), so we skip the
      # flaky `xcodebuild -exportArchive` distribution machinery and just copy
      # the .app out. The next step re-seals it after signing the embedded oak.
      - name: Export app
        if: steps.check.outputs.skip == 'false'
        run: |
          mkdir -p "$RUNNER_TEMP/export"
          cp -R \
            "$RUNNER_TEMP/${{ env.APP_NAME }}.xcarchive/Products/Applications/${{ env.APP_NAME }}.app" \
            "$RUNNER_TEMP/export/"

      # ── Re-sign Sparkle + embedded oak CLI, then re-seal the bundle ────
      - name: Sign embedded binaries
        if: steps.check.outputs.skip == 'false'
        run: |
          APP="$RUNNER_TEMP/export/${{ env.APP_NAME }}.app"
          IDENTITY="Developer ID Application"
          SIGN=(codesign --force --options runtime --timestamp --sign "$IDENTITY")

          # The archive embedded the provisioning profile (project.yml's
          # PROVISIONING_PROFILE_SPECIFIER) and `cp -R` preserved it. Confirm it's
          # there — without it AMFI SIGKILLs the app at launch.
          if [ ! -f "$APP/Contents/embedded.provisionprofile" ]; then
            echo "::error::No embedded.provisionprofile in the archived app. The archive did not pick up the 'OakReader Developer ID' profile — verify it installed before the archive step."
            exit 1
          fi

          # Capture the EXACT entitlements Xcode sealed during the archive. They
          # include the expanded com.apple.application-identifier that pairs with
          # the embedded profile; re-sealing the outer bundle (below) with the
          # static OakReader.entitlements would drop it and break AMFI's profile
          # authorization at launch. We re-seal with these instead.
          ENTITLEMENTS="$RUNNER_TEMP/release.entitlements.plist"
          codesign -d --entitlements - --xml "$APP" > "$ENTITLEMENTS"

          # Sparkle is built from SPM source, so its nested helpers are only
          # ad-hoc signed — notarization rejects them ("not signed with a valid
          # Developer ID certificate" / "no secure timestamp"). Developer ID
          # signing in project.yml is scoped to the OakReader target, so it never
          # reaches the framework. Re-sign Sparkle's components inside-out, in the
          # order Sparkle documents, before sealing the outer bundle.
          SPARKLE="$APP/Contents/Frameworks/Sparkle.framework"
          if [ -d "$SPARKLE" ]; then
            VER=$(readlink "$SPARKLE/Versions/Current" || echo B)
            V="$SPARKLE/Versions/$VER"
            for comp in \
              "$V/XPCServices/Installer.xpc" \
              "$V/XPCServices/Downloader.xpc" \
              "$V/Autoupdate" \
              "$V/Updater.app"; do
              [ -e "$comp" ] && { echo "Signing: $comp"; "${SIGN[@]}" "$comp"; }
            done
            echo "Signing: $SPARKLE"
            "${SIGN[@]}" "$SPARKLE"
          fi

          # The oak CLI is copied into Contents/Resources by a build phase, so
          # Xcode's export may not sign it. Sign every loose Mach-O in Resources
          # with the hardened runtime (oak uses no restricted entitlements).
          find "$APP/Contents/Resources" -type f -perm +111 | while read -r f; do
            if file "$f" | grep -q "Mach-O"; then
              echo "Signing: $f"
              "${SIGN[@]}" "$f"
            fi
          done

          # Re-seal the outer bundle so CodeResources covers everything (re)signed
          # above — including the embedded provisioning profile. Use the archive's
          # own entitlements (captured above), NOT the static file, so the
          # application-identifier that authorizes the profile survives. NOT --deep
          # — the components are already correctly signed.
          "${SIGN[@]}" --entitlements "$ENTITLEMENTS" "$APP"

          codesign --verify --deep --strict --verbose=2 "$APP"

          # Surface the sealed entitlements + embedded profile in the log so a
          # missing keychain group / application-identifier is caught here, not by
          # a user whose app won't open.
          echo "── Sealed entitlements ──"
          codesign -d --entitlements - --xml "$APP" | plutil -p - || true

      # ── Package DMG ───────────────────────────────────────────
      - name: Create DMG
        if: steps.check.outputs.skip == 'false'
        run: |
          brew install create-dmg
          APP="$RUNNER_TEMP/export/${{ env.APP_NAME }}.app"
          DMG_PATH="$RUNNER_TEMP/${{ env.APP_NAME }}.dmg"

          # Give the DMG (and its mounted volume) the app icon instead of the
          # generic disk-image icon. The .app already carries AppIcon.icns.
          VOLICON_ARGS=()
          ICNS="$APP/Contents/Resources/AppIcon.icns"
          [ -f "$ICNS" ] && VOLICON_ARGS=(--volicon "$ICNS")

          create-dmg \
            --volname "${{ env.APP_NAME }}" \
            "${VOLICON_ARGS[@]}" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 160 \
            --icon "${{ env.APP_NAME }}.app" 180 170 \
            --hide-extension "${{ env.APP_NAME }}.app" \
            --app-drop-link 480 170 \
            --no-internet-enable \
            "$DMG_PATH" \
            "$APP"

          echo "DMG_PATH=$DMG_PATH" >> "$GITHUB_ENV"

      # ── Notarize + staple (App Store Connect API key) ─────────
      - name: Notarize DMG
        if: steps.check.outputs.skip == 'false'
        env:
          ASC_API_KEY: ${{ secrets.ASC_API_KEY }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          ASC_KEY_PATH="$RUNNER_TEMP/asc_api_key.p8"
          echo "$ASC_API_KEY" | base64 --decode > "$ASC_KEY_PATH"

          xcrun notarytool submit "$DMG_PATH" \
            --key "$ASC_KEY_PATH" \
            --key-id "$ASC_KEY_ID" \
            --issuer "$ASC_ISSUER_ID" \
            --wait

          xcrun stapler staple "$DMG_PATH"

      # ── Sparkle: sign + generate appcast (MERGING history) ────
      - name: Install Sparkle tools
        if: steps.check.outputs.skip == 'false'
        run: |
          curl -sL "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" \
            | tar xJ -C "$RUNNER_TEMP" bin/sign_update bin/generate_appcast
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Generate appcast
        if: steps.check.outputs.skip == 'false'
        env:
          SPARKLE_ED_KEY: ${{ secrets.SPARKLE_ED_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          APPCAST_DIR="$RUNNER_TEMP/appcast_dir"
          mkdir -p "$APPCAST_DIR"

          # Download the existing appcast so generate_appcast MERGES rather than
          # replaces. Without this, each release's appcast contains only the
          # latest item and installed clients lose the update chain.
          aws s3 cp "s3://$R2_BUCKET/$R2_PREFIX/appcast.xml" \
            "$APPCAST_DIR/appcast.xml" \
            --endpoint-url "$R2_ENDPOINT" \
            || echo "::warning::No existing appcast.xml — generating fresh history"

          cp "$DMG_PATH" "$APPCAST_DIR/"

          echo "$SPARKLE_ED_KEY" | generate_appcast \
            --ed-key-file - \
            --download-url-prefix "$DOWNLOAD_BASE_URL/$R2_PREFIX/v${VERSION}/" \
            "$APPCAST_DIR"

          cp "$APPCAST_DIR/appcast.xml" "$RUNNER_TEMP/appcast.xml"

      # ── Upload DMG + appcast to R2 ────────────────────────────
      - name: Upload to R2
        if: steps.check.outputs.skip == 'false'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Versioned copy — the URL the appcast points at (immutable per release).
          aws s3 cp "$DMG_PATH" \
            "s3://$R2_BUCKET/$R2_PREFIX/v${VERSION}/${{ env.APP_NAME }}.dmg" \
            --endpoint-url "$R2_ENDPOINT"

          # Stable "latest" copy — the website's Download button links here so it
          # always serves the newest release without a code change per version.
          aws s3 cp "$DMG_PATH" \
            "s3://$R2_BUCKET/$R2_PREFIX/${{ env.APP_NAME }}.dmg" \
            --endpoint-url "$R2_ENDPOINT" \
            --cache-control "no-cache"

          aws s3 cp "$RUNNER_TEMP/appcast.xml" \
            "s3://$R2_BUCKET/$R2_PREFIX/appcast.xml" \
            --endpoint-url "$R2_ENDPOINT" \
            --cache-control "no-cache"

      # ── Purge Cloudflare edge cache for the stable URLs ───────
      # The custom domain is fronted by Cloudflare's CDN, which caches the stable
      # DMG + appcast (~4h) and overrides the origin's no-cache. Versioned URLs
      # are immutable so they don't matter; but the stable OakReader.dmg and
      # appcast.xml change every release, so purge just those two by URL — keeping
      # CDN caching between releases while making new content appear immediately.
      # No-ops (with a notice) until CLOUDFLARE_API_TOKEN is set (Zone:Cache Purge).
      - name: Purge Cloudflare cache
        if: steps.check.outputs.skip == 'false'
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE_ID: "4c5dc9f18f814b359a79b7124d0fe681"
        run: |
          if [ -z "$CF_API_TOKEN" ]; then
            echo "::notice::CLOUDFLARE_API_TOKEN not set — skipping cache purge (stable URLs follow the ~4h edge TTL)."
            exit 0
          fi
          curl -sf -X POST \
            "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/purge_cache" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"files":[
              "'"$DOWNLOAD_BASE_URL/$R2_PREFIX/${{ env.APP_NAME }}.dmg"'",
              "'"$DOWNLOAD_BASE_URL/$R2_PREFIX/appcast.xml"'"
            ]}' \
            && echo "Purged stable DMG + appcast from Cloudflare cache"

      # ── Tag + GitHub Release (draft) ──────────────────────────
      - name: Create tag and GitHub Release
        if: steps.check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          git tag "v${VERSION}"
          git push origin "v${VERSION}"

          gh release create "v${VERSION}" \
            --title "${{ env.APP_NAME }} v${VERSION}" \
            --draft \
            --notes "Download: $DOWNLOAD_BASE_URL/$R2_PREFIX/v${VERSION}/${{ env.APP_NAME }}.dmg"

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/signing.keychain-db" 2>/dev/null || true
