name: OakReader
options:
  bundleIdPrefix: com.oakreader
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

packages:
  OakReaderAI:
    path: Packages/OakReaderAI
  VoiceAgentKit:
    path: Packages/VoiceAgentKit
  Textual:
    url: https://github.com/gonzalezreal/textual
    from: "0.1.0"
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.0.0"
  Highlightr:
    url: https://github.com/raspu/Highlightr.git
    from: "2.3.0"
  YouTubePlayerKit:
    url: https://github.com/SvenTiigi/YouTubePlayerKit.git
    from: "2.0.0"
  CMarkGFM:
    url: https://github.com/stackotter/swift-cmark-gfm
    from: "1.0.2"
  YoutubeTranscript:
    url: https://github.com/skainguyen1412/swift-youtube-transcript.git
    from: "1.0.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    ENABLE_STRICT_OBJC_MSGSEND: YES

targets:
  OakReader:
    type: application
    platform: macOS
    sources:
      - path: OakReader
        excludes:
          - "**/Info.plist"
          - "**/*.entitlements"
    dependencies:
      - package: OakReaderAI
      - package: VoiceAgentKit
      - package: Textual
      - package: GRDB
        product: GRDB
      - package: Highlightr
      - package: CMarkGFM
      - package: YouTubePlayerKit
      - package: YoutubeTranscript
    postCompileScripts:
      - script: |
          if which swiftlint > /dev/null; then
            swiftlint || true
          else
            echo "warning: SwiftLint not installed"
          fi
        name: "SwiftLint"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.oakreader.OakReader
        PRODUCT_NAME: OakReader
        INFOPLIST_FILE: OakReader/App/Info.plist
        CODE_SIGN_ENTITLEMENTS: OakReader/OakReader.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_IDENTITY: "-"
        SWIFT_STRICT_CONCURRENCY: minimal

  oakreader-chat:
    type: tool
    platform: macOS
    sources:
      - path: cli
    dependencies:
      - package: OakReaderAI
    settings:
      base:
        PRODUCT_NAME: oakreader-chat
        SWIFT_STRICT_CONCURRENCY: minimal
