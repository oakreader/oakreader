name: OakReader
options:
  bundleIdPrefix: com.oakreader
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

packages:
  OakAgent:
    path: Packages/OakAgent
  OakAI:
    path: Packages/OakAI
  Textual:
    url: https://github.com/gonzalezreal/textual
    from: "0.1.0"
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.0.0"
  Highlightr:
    url: https://github.com/raspu/Highlightr.git
    from: "2.3.0"
  YouTubePlayerKit:
    url: https://github.com/SvenTiigi/YouTubePlayerKit.git
    from: "2.0.0"
  CMarkGFM:
    url: https://github.com/stackotter/swift-cmark-gfm
    from: "1.0.2"
  YoutubeTranscript:
    url: https://github.com/skainguyen1412/swift-youtube-transcript.git
    from: "1.0.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"
  mlx-swift:
    url: https://github.com/ml-explore/mlx-swift
    from: "0.31.3"
  mlx-swift-lm:
    url: https://github.com/ml-explore/mlx-swift-lm.git
    from: "3.0.0"
  usearch:
    url: https://github.com/unum-cloud/usearch
    from: "2.0.0"
  OakVoice:
    path: Packages/OakVoice
  DSFQuickActionBar:
    url: https://github.com/dagronf/DSFQuickActionBar
    from: "6.2.0"
  swift-fsrs:
    url: https://github.com/open-spaced-repetition/swift-fsrs
    branch: main
  swift-argument-parser:
    url: https://github.com/apple/swift-argument-parser.git
    from: "1.3.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    ENABLE_STRICT_OBJC_MSGSEND: YES

targets:
  OakReader:
    type: application
    platform: macOS
    sources:
      - path: OakReader
        excludes:
          - "**/Info.plist"
          - "**/*.entitlements"
    resources:
      - path: skills
      - path: character
    dependencies:
      - package: OakAI
      - package: OakAgent
      - package: Textual
      - package: GRDB
        product: GRDB
      - package: Highlightr
      - package: CMarkGFM
      - package: YouTubePlayerKit
      - package: YoutubeTranscript
      - package: Sparkle
      - package: mlx-swift
        product: MLX
      - package: mlx-swift-lm
        product: MLXEmbedders
      - package: mlx-swift-lm
        product: MLXLMCommon
      - package: usearch
        product: USearch
      - package: OakVoice
      - package: DSFQuickActionBar
      - package: swift-fsrs
        product: FSRS
      - target: oak
    postCompileScripts:
      - script: |
          if which swiftlint > /dev/null; then
            swiftlint || true
          else
            echo "warning: SwiftLint not installed"
          fi
        name: "SwiftLint"
      - script: |
          cp "${BUILT_PRODUCTS_DIR}/oak" "${BUILT_PRODUCTS_DIR}/OakReader.app/Contents/Resources/oak"
        name: "Embed oak CLI"
    settings:
      base:
        PRODUCT_NAME: OakReader
        INFOPLIST_FILE: OakReader/App/Info.plist
        # Marketing version is the release trigger and source of truth: bump it
        # (SemVer X.Y.Z) and merge to main to ship. CURRENT_PROJECT_VERSION is a
        # placeholder; CI overrides it with the git commit count at archive time.
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        # Sparkle EdDSA public key (NOT secret). Paste the key printed by
        # Sparkle's generate_keys here after generating the keypair; the matching
        # private key is the SPARKLE_ED_KEY GitHub secret. Empty in dev builds
        # (which don't auto-update) is fine.
        SPARKLE_PUBLIC_ED_KEY: "zm3UpFrDf8tFcctK2vkEhrms6oFTp50AUb824lP9BAw="
        CODE_SIGN_ENTITLEMENTS: OakReader/OakReader.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_IDENTITY: "-"
        SWIFT_STRICT_CONCURRENCY: minimal
        SWIFT_OBJC_BRIDGING_HEADER: OakReader/OakReader-Bridging-Header.h
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.oakreader.OakReader.dev
          BUNDLE_DISPLAY_NAME: "OakReader Dev"
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.oakreader.OakReader
          BUNDLE_DISPLAY_NAME: "OakReader"

  oak:
    type: tool
    platform: macOS
    sources:
      - path: cli
    dependencies:
      - package: OakAgent
      - package: GRDB
        product: GRDB
      - package: swift-argument-parser
        product: ArgumentParser
    settings:
      base:
        PRODUCT_NAME: oak
        SWIFT_STRICT_CONCURRENCY: minimal
