name: OakReader
options:
  bundleIdPrefix: com.oakreader
  deploymentTarget:
    macOS: "15.4"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true
  developmentLanguage: en

# Languages the app ships UI for. `en` is the source/development language
# (its strings live inline in the SwiftUI code); the rest are translated in
# OakReader/Resources/Localizable.xcstrings (the String Catalog). Adding a
# region here makes Xcode emit its .lproj and exposes it for system-language
# selection. Order is display-only.
knownRegions:
  - en
  - zh-Hans
  - zh-Hant
  - ja
  - ko
  - de
  - fr
  - es

packages:
  OakAgent:
    path: Packages/OakAgent
  OakAI:
    path: Packages/OakAI
  OakMarkdownUI:
    path: Packages/OakMarkdownUI
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.0.0"
  Highlightr:
    url: https://github.com/raspu/Highlightr.git
    from: "2.3.0"
  CMarkGFM:
    url: https://github.com/stackotter/swift-cmark-gfm
    from: "1.0.2"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"
  OakVoice:
    path: Packages/OakVoice
  swift-argument-parser:
    url: https://github.com/apple/swift-argument-parser.git
    from: "1.3.0"
  PostHog:
    url: https://github.com/PostHog/posthog-ios
    from: "3.60.0"
  MarkdownEngine:
    url: https://github.com/nodes-app/swift-markdown-engine
    from: "0.7.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "15.4"
    ENABLE_STRICT_OBJC_MSGSEND: YES
    # Auto-harvest UI string literals into the String Catalog at build time so
    # new strings can't ship as untranslated English silently.
    SWIFT_EMIT_LOC_STRINGS: YES
    LOCALIZATION_PREFERS_STRING_CATALOGS: YES

targets:
  OakReader:
    type: application
    platform: macOS
    sources:
      - path: OakReader
        excludes:
          - "**/Info.plist"
          - "**/*.entitlements"
    resources:
      - path: skills
      - path: prompts
    dependencies:
      - package: OakAI
      - package: OakAgent
      - package: OakMarkdownUI
      - package: GRDB
        product: GRDB
      - package: Highlightr
      - package: CMarkGFM
      - package: Sparkle
      - package: OakVoice
      - package: PostHog
        product: PostHog
      - package: MarkdownEngine
        product: MarkdownEngine
      - package: MarkdownEngine
        product: MarkdownEngineLatex
      - package: MarkdownEngine
        product: MarkdownEngineCodeBlocks
      - target: oak
    postCompileScripts:
      - script: |
          if which swiftlint > /dev/null; then
            swiftlint || true
          else
            echo "warning: SwiftLint not installed"
          fi
        name: "SwiftLint"
      - script: |
          cp "${BUILT_PRODUCTS_DIR}/oak" "${BUILT_PRODUCTS_DIR}/OakReader.app/Contents/Resources/oak"
        name: "Embed oak CLI"
    settings:
      base:
        PRODUCT_NAME: OakReader
        INFOPLIST_FILE: OakReader/App/Info.plist
        # Marketing version is the release trigger and source of truth: bump it
        # (SemVer X.Y.Z) and merge to main to ship. CURRENT_PROJECT_VERSION is a
        # placeholder; CI overrides it with the git commit count at archive time.
        MARKETING_VERSION: "0.7.8"
        CURRENT_PROJECT_VERSION: "1"
        # Sparkle EdDSA public key (NOT secret). Paste the key printed by
        # Sparkle's generate_keys here after generating the keypair; the matching
        # private key is the SPARKLE_ED_KEY GitHub secret. Empty in dev builds
        # (which don't auto-update) is fine.
        SPARKLE_PUBLIC_ED_KEY: "zm3UpFrDf8tFcctK2vkEhrms6oFTp50AUb824lP9BAw="
        CODE_SIGN_ENTITLEMENTS: OakReader/OakReader.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_IDENTITY: "-"
        SWIFT_STRICT_CONCURRENCY: minimal
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.oakreader.OakReader.dev
          BUNDLE_DISPLAY_NAME: "OakReader Dev"
          # Sign local dev builds with a stable Apple Development identity, scoped
          # to THIS target only (same reasoning as Release: global xcodebuild
          # signing overrides break SPM package targets and the oak tool). A
          # constant identity across rebuilds keeps TCC grants (mic, local
          # network) from being invalidated — ad-hoc ("-") changes identity
          # every build and re-fires those prompts.
          CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: "Apple Development"
          DEVELOPMENT_TEAM: "5Y27G7B6D8"
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.oakreader.OakReader
          BUNDLE_DISPLAY_NAME: "OakReader"
          # Developer ID signing for distribution, scoped to THIS target only.
          # (Passing these as global xcodebuild overrides breaks SPM package
          # targets and the oak tool — which is also why the provisioning profile
          # is set here, per-target, NOT on the archive command line: a command-
          # line tool like `oak` rejects a global PROVISIONING_PROFILE_SPECIFIER.)
          #
          # The app carries the `keychain-access-groups` entitlement (data-
          # protection keychain) — a RESTRICTED key, so a Developer ID build MUST
          # embed a provisioning profile covering `5Y27G7B6D8.com.oakreader.keys`
          # or AMFI SIGKILLs it at launch (notarization still passes). The release
          # workflow decodes the PROVISIONING_PROFILE secret and installs a
          # profile named EXACTLY "OakReader Developer ID" before archiving; the
          # specifier below makes Xcode embed it. See the macos-release-setup
          # skill, failure mode #4.
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Developer ID Application"
          DEVELOPMENT_TEAM: "5Y27G7B6D8"
          PROVISIONING_PROFILE_SPECIFIER: "OakReader Developer ID"
          OTHER_CODE_SIGN_FLAGS: "--timestamp"

  oak:
    type: tool
    platform: macOS
    sources:
      - path: cli
    dependencies:
      - package: OakAgent
      - package: GRDB
        product: GRDB
      - package: swift-argument-parser
        product: ArgumentParser
    settings:
      base:
        PRODUCT_NAME: oak
        SWIFT_STRICT_CONCURRENCY: minimal
        # Keep oak out of the archive's install products — it's embedded into the
        # app bundle by the "Embed oak CLI" script, not shipped as a standalone
        # tool. Leaving it installed bloats the archive with a stray /usr/local/bin/oak.
        SKIP_INSTALL: YES
